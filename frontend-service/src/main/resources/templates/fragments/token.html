<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="card">
    <p><strong>Expire à :</strong> <span th:text="${expiresAt}"></span></p>
    <p><strong>Scopes :</strong> <span th:text="${scopes}"></span></p>
    <details>
        <summary>Voir le JWT brut</summary>
        <pre style="background:#1f2937;color:#f3f4f6;padding:.75rem;border-radius:6px;
                    word-break:break-all;white-space:pre-wrap;font-size:.75rem;"
             th:text="${accessToken}"></pre>
    </details>
</div>
</body>
</html>
